name: '💥 Merge Conflicts'
on:
  # So that PRs touching the same files as the push are updated
  push:
  # So that the `dirtyLabel` is removed if conflicts are resolve
  # We recommend `pull_request_target` so that github secrets are available.
  # In `pull_request` we wouldn't be able to change labels of fork PRs
  pull_request_target:
    types: [synchronize]

jobs:
  main:
    name: 'Label PRs with merge conflicts'
    runs-on: ubuntu-slim
    permissions: write-all
    steps:
      - name: Check for merge conflicts
        uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1 # ratchet:eps1lon/actions-label-merge-conflict@releases/2.x
        with:
          dirtyLabel: '💥 Merge Conflicts'
          removeOnDirtyLabel: 'PR: ready to ship'
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          commentOnDirty: |
            **This PR has merge conflicts with `main`.**

            Please rebase your branch:
            ```bash
            # Add upstream remote (one-time setup)
            git remote add upstream https://github.com/openfoodfacts/openfoodfacts-explorer.git

            # Fetch latest main and rebase
            git fetch upstream
            git rebase upstream/main

            # Resolve any conflicts, then:
            git push --force-with-lease origin YOUR_BRANCH
            ```

            > **Tip:** Enable "Allow edits from maintainers" on this PR so we can auto-rebase for you next time. This only grants access to your PR branch. Your fork's other branches are not affected.
          commentOnClean: ''
