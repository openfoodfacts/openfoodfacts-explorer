name: '🏷️ Auto-Label PRs'
on:
  - pull_request_target

jobs:
  label:
    name: 'Add labels'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write # to update the pull request with labels
      issues: write # to create labels if they don't exist

    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # ratchet:actions/labeler@v6.2.0
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
