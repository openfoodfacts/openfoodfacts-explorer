name: '🏷️ Auto-Label PRs'
on:
  - pull_request_target

jobs:
  label:
    name: 'Add labels'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write # to update the pull request with labels
      issues: write # to create labels if they don't exist

    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # ratchet:actions/labeler@v7.0.0
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
