      - uses: actions/add-to-project@27022a19346d0433f2b9859dd2b69d38f4277808 # ratchet:actions/add-to-project@main
        with:
          project-url: https://github.com/orgs/openfoodfacts/projects/44 # Add issue to the data quality project
