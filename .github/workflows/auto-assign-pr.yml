# .github/workflows/auto-author-assign.yml
name: '👩‍💻 Auto-assign Pull Request Author'

on:
  pull_request_target:
    types: [opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  assign-author:
    name: 'Pull request assignment'
    runs-on: ubuntu-slim
    steps:
      - uses: toshimaru/auto-author-assign@3e19bfc990cb1cf0589dce95e9f75289bb1e22de # ratchet:toshimaru/auto-author-assign@v3.0.3
